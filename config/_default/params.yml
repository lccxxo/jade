        color: #8a7b69 !important;
        font-size: 18px !important;
      }

      .post-wrap.no-cover {
        height: auto !important;
        min-height: 232px;
      }

      .post-wrap.no-cover .post-info {
        padding: 24px 26px;
      }

      .post-wrap.no-cover .post-title {
        padding: 14px 0 18px;
        white-space: normal;
      }

      .post-wrap.no-cover .post-article {
        -webkit-line-clamp: 5;
        line-clamp: 5;
      }

      @media (max-width: 991px) {
        .post-wrap.no-cover {
          min-height: 0;
        }

        .post-wrap.no-cover .post-info {
          padding: 20px;
        }
      }

      .jade-player {
        position: fixed;
        left: 24px;
        bottom: 24px;
        z-index: 9999;
        width: min(320px, calc(100vw - 48px));
        padding: 12px;
        border: 1px solid var(--color-border);
        border-radius: 18px;
        background: rgba(252, 250, 247, 0.96);
        box-shadow: 0 16px 36px rgba(120, 108, 95, 0.14);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .jade-player[hidden] {
        display: none !important;
      }

      .jade-player__top {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }

      .jade-player__cover {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        object-fit: cover;
        box-shadow: 0 8px 20px rgba(120, 108, 95, 0.16);
      }

      .jade-player__meta {
        min-width: 0;
      }

      .jade-player__eyebrow {
        margin: 0 0 3px;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9a8f82;
      }

      .jade-player__title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        color: #5c5145;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .jade-player__artist {
        margin: 2px 0 0;
        font-size: 12px;
        color: #8f8172;
      }

      .jade-player__audio {
        width: 100%;
        margin-bottom: 10px;
        accent-color: #b4a492;
      }

      .jade-player__playlist {
        margin: 0;
        padding: 0;
        list-style: none;
        max-height: 128px;
        overflow: auto;
      }

      .jade-player__track {
        width: 100%;
        border: 0;
        background: transparent;
        border-radius: 12px;
        padding: 8px 10px;
        text-align: left;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .jade-player__track:hover {
        background: rgba(216, 203, 189, 0.3);
      }

      .jade-player__track.is-active {
        background: rgba(216, 203, 189, 0.22);
      }

      .jade-player__track-name {
        display: block;
        font-size: 13px;
        color: #5c5145;
      }

      .jade-player__track-artist {
        display: block;
        margin-top: 2px;
        font-size: 11px;
        color: #8f8172;
      }

      @media (max-width: 767px) {
        .jade-player {
          left: 12px !important;
          right: 12px !important;
          bottom: 12px !important;
          width: auto !important;
        }

        .jade-player__playlist {
          max-height: 120px;
        }
      }
    </style>
  body_begin: # Inject code snippet right after <body>
  body_end: |-
    <section id="jade-player" class="jade-player">
      <div class="jade-player__top">
        <img class="jade-player__cover" src="/images/p7260478-by-sophearak-tha.jpg" alt="cover">
        <div class="jade-player__meta">
          <p class="jade-player__eyebrow">Now Playing</p>
          <h3 class="jade-player__title" data-role="title">Yong Bei Ji Chang Qing Ge</h3>
          <p class="jade-player__artist" data-role="artist">gareth.t</p>
        </div>
      </div>
      <audio class="jade-player__audio" data-role="audio" controls preload="metadata" src="/music/gareth-t-yong-bei-ji-chang-qing-ge.mp3"></audio>
      <ul class="jade-player__playlist" data-role="playlist"></ul>
    </section>
    <script>
      (function () {
        const playlist = [
          {
            name: "Yong Bei Ji Chang Qing Ge",
            artist: "gareth.t",
            url: "/music/gareth-t-yong-bei-ji-chang-qing-ge.mp3",
            cover: "/images/p7260478-by-sophearak-tha.jpg"
          },
          {
            name: "Quan Shi Jie Shi Mian",
            artist: "Eason Chan",
            url: "/music/eason-chan-quan-shi-jie-shi-mian.mp3",
            cover: "/images/p7260478-by-sophearak-tha.jpg"
          },
          {
            name: "Nian Nian",
            artist: "Song Dongye",
            url: "/music/song-dongye-nian-nian.mp3",
            cover: "/images/p7260478-by-sophearak-tha.jpg"
          },
          {
            name: "Zuo Zhuan Deng 1000 Times",
            artist: "Patrick Brasca",
            url: "/music/patrick-brasca-zuo-zhuan-deng-1000-times.mp3",
            cover: "/images/p7260478-by-sophearak-tha.jpg"
          },
          {
            name: "Jie Hun Ji",
            artist: "Shui Xian Dou Huo Fo",
            url: "/music/jie-hun-ji-shui-xian-dou-huo-fo.mp3",
            cover: "/images/p7260478-by-sophearak-tha.jpg"
          },
          {
            name: "Zhen De Ma Is It True",
            artist: "Karen Mok",
            url: "/music/karen-mok-zhen-de-ma-is-it-true.mp3",
            cover: "/images/p7260478-by-sophearak-tha.jpg"
          }
        ];

        const init = function () {
          const root = document.getElementById("jade-player");
          if (!root || root.dataset.initialized === "true" || !playlist.length) return;

          const audio = root.querySelector('[data-role="audio"]');
          const title = root.querySelector('[data-role="title"]');
          const artist = root.querySelector('[data-role="artist"]');
          const cover = root.querySelector(".jade-player__cover");
          const playlistElement = root.querySelector('[data-role="playlist"]');
          const storageKey = "jade-player-state";
          let currentIndex = 0;

          const readState = function () {
            try {
              const raw = localStorage.getItem(storageKey);
              return raw ? JSON.parse(raw) : null;
            } catch (error) {
              return null;
            }
          };

          const writeState = function (isPlayingOverride) {
            try {
              localStorage.setItem(
                storageKey,
                JSON.stringify({
                  index: currentIndex,
                  currentTime: Number.isFinite(audio.currentTime) ? audio.currentTime : 0,
                  isPlaying: typeof isPlayingOverride === "boolean" ? isPlayingOverride : !audio.paused,
                  volume: audio.volume
                })
              );
            } catch (error) {}
          };

          const renderPlaylist = function () {
            playlistElement.innerHTML = "";

            playlist.forEach(function (track, index) {
              const item = document.createElement("li");
              const button = document.createElement("button");
              const name = document.createElement("span");
              const trackArtist = document.createElement("span");

              button.type = "button";
              button.className = "jade-player__track" + (index === currentIndex ? " is-active" : "");
              button.addEventListener("click", function () {
                loadTrack(index, true);
              });

              name.className = "jade-player__track-name";
              name.textContent = track.name;
              trackArtist.className = "jade-player__track-artist";
              trackArtist.textContent = track.artist;

              button.appendChild(name);
              button.appendChild(trackArtist);
              item.appendChild(button);
              playlistElement.appendChild(item);
            });
          };

          const loadTrack = function (index, autoplay, startTime) {
            currentIndex = (index + playlist.length) % playlist.length;
            const track = playlist[currentIndex];

            title.textContent = track.name;
            artist.textContent = track.artist;
            audio.src = track.url;

             if (typeof startTime === "number" && startTime > 0) {
              const seekToSavedTime = function () {
                audio.currentTime = startTime;
              };
              audio.addEventListener("loadedmetadata", seekToSavedTime, { once: true });
            }

            if (track.cover) {
              cover.src = track.cover;
            }

            renderPlaylist();
            writeState(autoplay);

            if (autoplay) {
              audio.play().then(function () {
                writeState(true);
              }).catch(function () {
                writeState(false);
              });
            }
          };

          audio.volume = 0.7;
          audio.addEventListener("ended", function () {
            loadTrack(currentIndex + 1, true, 0);
          });
          audio.addEventListener("play", function () {
            writeState(true);
          });
          audio.addEventListener("pause", function () {
            writeState(false);
          });
          audio.addEventListener("timeupdate", function () {
            writeState();
          });
          audio.addEventListener("volumechange", function () {
            writeState();
          });
          window.addEventListener("pagehide", function () {
            writeState();
          });

          const savedState = readState();
          if (savedState && typeof savedState.volume === "number") {
            audio.volume = savedState.volume;
          }

          if (savedState && typeof savedState.index === "number") {
            loadTrack(savedState.index, false, savedState.currentTime || 0);
            if (savedState.isPlaying) {
              audio.play().then(function () {
                writeState(true);
              }).catch(function () {
                writeState(false);
              });
            }
          } else {
            loadTrack(0, true, 0);
          }

          root.dataset.initialized = "true";
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", init, { once: true });
        } else {
          init();
        }
      })();
    </script>
