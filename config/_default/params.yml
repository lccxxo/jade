      [data-theme="dark"] #header-nav .nav-icon,
      [data-theme="dark"] #header-nav .main-nav-link-wrap,
      [data-theme="dark"] #header-nav .select-selected,
      [data-theme="dark"] #header-nav .select-items li {
        color: #6f6254 !important;
      }

      a,
      .article-entry a,
      .sidebar a,
      .widget a {
        color: var(--color-link) !important;
      }

      .sidebar-top {
        border: 1px solid var(--color-border);
        background: rgba(252, 250, 247, 0.96) !important;
        box-shadow: 0 16px 36px rgba(120, 108, 95, 0.14) !important;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        overflow: hidden;
      }

      .sidebar-top .sidebar-top-taichi {
        display: none !important;
      }

      .sidebar-top .arrow-up {
        position: absolute;
        inset: 0;
        display: block;
        opacity: 1 !important;
      }

      .sidebar-top:hover .arrow-up {
